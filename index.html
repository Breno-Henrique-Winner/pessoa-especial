<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title> Mamãe </title>
	<link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <div class="container">
        <h1>💖 Homenagem Especial 💖</h1>

        <p>
            Hoje quero dedicar esse espaço para a pessoa mais importante da minha vida:
            <span class="nome">Geiza</span>.
        </p>

        <p>
            Mãe, você é meu exemplo de força, amor e dedicação. 
            Tudo que sou hoje é graças a você.
        </p>

        <p class="mensagem">
            Eu te amo muito! 💕
        </p>
        <button onclick="mostrarMensagem()" class="botao-amor">
    Clique para ver uma mensagem 💌
</button>
        <p id="mensagemOculta" style="display: none; margin-top:20px; font-size:1.3em;">
    💖 Mãe, você é a melhor do mundo! Obrigado por tudo, Geiza! Te amo muito! 💖
</p>



<script>
function mostrarMensagem() {
    document.getElementById("mensagemOculta").style.display = "block";
}
</script>
</body>
</html>
