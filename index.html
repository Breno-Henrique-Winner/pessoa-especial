<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title> Mamãe </title>
	<link rel="stylesheet" href="css/estilo.css">
</head>
<body>

    <div class="container">
        <h1>💖 Homenagem Especial 💖</h1>

        <p>
            Hoje quero dedicar esse espaço para a pessoa mais importante da minha vida:
            <span class="nome">Geiza</span>.
        </p>

        <p>
            Mãe, você é meu exemplo de força, amor e dedicação. 
            Tudo que sou hoje é graças a você.
        </p>

        <p class="mensagem">
            Eu te amo muito! 💕
        </p>
        <button onclick="mostrarAmor()" class="botao-amor">Clique para espalhar amor 💕</button>

<div id="coracoes"></div>
    </div>
<script>
function mostrarAmor() {
    const container = document.getElementById("coracoes");

    for (let i = 0; i < 15; i++) {
        const coracao = document.createElement("div");
        coracao.classList.add("coracao");
        coracao.innerHTML = "💖";

        coracao.style.left = Math.random() * 100 + "vw";
        coracao.style.top = "80vh";

        container.appendChild(coracao);

        setTimeout(() => {
            coracao.remove();
        }, 2000);
    }
}
</script>
</body>
</html>
